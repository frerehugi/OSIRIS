[profile.default]
src            = "contracts"
out            = "out"
libs           = ["lib"]
test           = "test"
script         = "script"
solc           = "0.8.20"
optimizer      = true
optimizer_runs = 200
via_ir         = true

# Celo RPC Endpoints
[rpc_endpoints]
celo_sepolia = "https://forno.celo-sepolia.celo-testnet.org"
celo_mainnet = "https://forno.celo.org"

# Block Explorer (für forge verify-contract)
[etherscan]
celo_sepolia = { key = "${CELOSCAN_API_KEY}", url = "https://api.etherscan.io/v2/api?chainid=11142220" }
celo_mainnet = { key = "${CELOSCAN_API_KEY}", url = "https://api.etherscan.io/v2/api?chainid=42220" }

# Fuzz-Test Einstellungen
[fuzz]
runs = 256
